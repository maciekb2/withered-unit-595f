<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<title>Generowanie artykułu</title>
<style>
body { font-family: sans-serif; padding: 2rem; }
#log {
  white-space: pre-wrap;
  background: #f4f4f4;
  padding: 1rem;
  border-radius: 4px;
  max-height: 60vh;
  overflow-y: auto;
  margin-top: 1em;
}
#panel {
  margin-bottom: 1em;
  border: 1px solid #ddd;
  padding: 1rem;
  border-radius: 4px;
  background: #fafafa;
}
#footer {
  margin-top: 2em;
}
.home-button { display: inline-block; padding: 0.75em 1.5em; background: var(--diplomatic-blue, #1c3d5a); color: var(--ivory, #f8f6f1); border-radius: 4px; text-decoration: none; border: 2px solid var(--diplomatic-blue, #1c3d5a); margin-right: 1em; }
.home-button:hover { background: var(--gold-accent, #cba135); color: var(--charcoal, #2d2d2d); }

</style>
</head>
<body>
<h1>Generowanie artykułu</h1>
<p>Wybierz temat i wygeneruj satyryczny wpis w tonie centro-prawicowym, PL-patriotycznym. Każda sekcja powinna zawierać spójny akapit około 10–20 linijek tekstu.</p>
<div id="panel">
  <div id="status">Oczekiwanie na dane...</div>

  <div id="log"></div>

  <button id="continue-btn" style="display:none">Kontynuuj</button>
</div>
<div id="footer">
  <a id="pr-link" class="home-button" style="display:none">Zobacz PR</a>
  <a href="/" class="home-button">Strona główna</a>
</div>

<script>
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const prLinkEl = document.getElementById('pr-link');
const continueBtn = document.getElementById('continue-btn');
let topicForm;

function sendLog(event, details = {}) {
  fetch('/api/client-log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ event, ...details }),
    credentials: 'include',
    keepalive: true,
  }).catch(() => {});
}

startStream();

function appendLog(text) {
  const div = document.createElement('div');
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}

function appendLogElement(el) {
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
}

function startStream() {
  appendLog('🔗 Łączenie z /api/generate-stream...');
  sendLog('connect', { endpoint: '/api/generate-stream' });
  const es = new EventSource('/api/generate-stream');
  es.addEventListener('open', () => {
    appendLog('🔌 Połączono z serwerem');
    sendLog('sse-open');
  });
  es.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    sendLog('sse-message', msg);
    if (msg.log) {
      appendLog(msg.log);
    }
  if (msg.failed) {
    statusEl.textContent = msg.errorTitle || 'Błąd generowania';
    const details = [
      msg.errorCode && `Kod: ${msg.errorCode}`,
      msg.stage && `Etap: ${msg.stage}`,
      msg.retryable === false && 'Wymagana interwencja operatora',
    ].filter(Boolean).join(' | ');
    if (details) appendLog(details);
    sendLog('generation-failed', {
      errorCode: msg.errorCode,
      errorTitle: msg.errorTitle,
      errorMessage: msg.errorMessage,
      stage: msg.stage,
      retryable: msg.retryable,
      status: msg.status,
      provider: msg.provider,
    });
    es.close();
  }
  if (msg.error) {
    appendLog(`❌ Błąd: ${msg.error}`);
  }
  if (msg.warnings) {
    appendLog('⚠️ Ostrzeżenia:');
    const list = document.createElement('ul');
    msg.warnings.forEach(w => {
      const li = document.createElement('li');
      li.textContent = w;
      list.appendChild(li);
    });
    appendLogElement(list);
  }
  if (msg.errors) {
    appendLog('❌ Błędy:');
    const list = document.createElement('ul');
    msg.errors.forEach(er => {
      const li = document.createElement('li');
      li.textContent = er;
      list.appendChild(li);
    });
    appendLogElement(list);
  }
  if (msg.stats) {
    appendLog(`📊 Statystyki: roszczenia=${msg.stats.claims}, ze źródłem=${msg.stats.withSource}, todo=${msg.stats.todo}`);
  }
  if (msg.recentTitles) {
    appendLog('📚 Ostatnie tytuły:');
    const list = document.createElement('ul');
    msg.recentTitles.forEach(t => {
      const li = document.createElement('li');
      li.textContent = t;
      list.appendChild(li);
    });
    appendLogElement(list);
  }
  if (msg.hotTopics) {
    appendLog('🔥 Gorące tematy:');
    const list = document.createElement('ul');
    msg.hotTopics.forEach(t => {
      const li = document.createElement('li');
      li.textContent = t;
      list.appendChild(li);
    });
    appendLogElement(list);
  }
  if (msg.topicSuggestions && !topicForm) {
    appendLog('💡 Propozycje tematów:');
    topicForm = document.createElement('div');
    msg.topicSuggestions.forEach((s) => {
      const label = document.createElement('label');
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'topic';
      radio.value = s.title;
      label.appendChild(radio);
      label.appendChild(document.createTextNode(`${s.title} – ${s.rationale}`));
      topicForm.appendChild(label);
      topicForm.appendChild(document.createElement('br'));
    });
    const custom = document.createElement('input');
    custom.type = 'text';
    custom.id = 'custom-topic';
    custom.placeholder = 'Własny temat';
    topicForm.appendChild(custom);
    appendLogElement(topicForm);
  }
  if (msg.articleTitle) {
    appendLog(`📰 Nowy artykuł: ${msg.articleTitle}`);
  }
  if (msg.awaitingTopic) {
    continueBtn.style.display = 'inline-block';
  }
  if (msg.prompt) {
    appendLog('📝 Kontekst wysłany do OpenAI:');
    appendLog(
      typeof msg.prompt === 'string'
        ? msg.prompt
        : JSON.stringify(msg.prompt, null, 2),
    );
  }
  if (msg.response) {
    appendLog('💬 Odpowiedź:');
    appendLog(msg.response);
  }
  if (msg.debug) {
    appendLog('🐞 Debug:');
    appendLog(typeof msg.debug === 'string' ? msg.debug : JSON.stringify(msg.debug, null, 2));
  }
  if (msg.parsed) {
    appendLog('📦 Parsed:');
    appendLog(typeof msg.parsed === 'string' ? msg.parsed : JSON.stringify(msg.parsed, null, 2));
  }
  if (msg.heroPrompt) {
    appendLog('🎨 Prompt (obrazek):');
    appendLog(msg.heroPrompt);
  }
    if (msg.done) {
      statusEl.textContent = 'Zakończono!';
      prLinkEl.href = msg.url;
      prLinkEl.style.display = 'inline-block';
      sendLog('sse-complete', { url: msg.url });
      es.close();
    }
  };
  es.onerror = (err) => {
    statusEl.textContent = 'Błąd połączenia (SSE)';
    appendLog(`❌ Błąd połączenia (SSE): ${err?.message || err}`);
    console.error('EventSource failed', err);
    sendLog('sse-error', { message: err.message });
    es.close();
  };

  continueBtn.addEventListener('click', async () => {
    continueBtn.disabled = true;
    try {
      appendLog('📨 Wysyłam wybrany temat do /api/update-prompt...');
      sendLog('update-prompt-send', { endpoint: '/api/update-prompt' });
      const res = await fetch('/api/update-prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          topic: (() => {
            if (topicForm) {
              const checked = topicForm.querySelector('input[name="topic"]:checked');
              if (checked) return checked.value;
              const custom = document.getElementById('custom-topic');
              if (custom) return custom.value;
            }
            return '';
          })(),
        }),
        credentials: 'include',
      });
      if (!res.ok) throw new Error('status ' + res.status);
      sendLog('update-prompt-response', { status: res.status });
      appendLog('⏭ Kontynuuję tworzenie...');
      continueBtn.style.display = 'none';
    } catch (err) {
      appendLog(`❌ Błąd podczas wysyłania tematu: ${err}`);
      sendLog('update-prompt-error', { message: String(err) });
      continueBtn.disabled = false;
    }
  });
}
</script>
</body>
</html>
