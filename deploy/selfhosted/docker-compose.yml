name: pseudointelekt

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/selfhosted/Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      JETSON_GATEWAY_URL: ${JETSON_GATEWAY_URL:?JETSON_GATEWAY_URL must be set}
    expose:
      - "3000"
    ports:
      - "10.2.11.53:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    networks: [app]

  # Internal-only generation runtime. No host port is published.
  generator:
    image: pseudointelekt-app
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      JETSON_GATEWAY_URL: ${JETSON_GATEWAY_URL:?JETSON_GATEWAY_URL must be set}
    expose:
      - "3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  scheduler:
    image: pseudointelekt-app
    command: ["node", "./scripts/selfhosted-scheduler.mjs"]
    env_file:
      - .env
    environment:
      SCHEDULER_APP_URL: http://generator:3001
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_RUN_HOUR: ${SCHEDULER_RUN_HOUR:-10}
      SCHEDULER_RUN_MINUTE: ${SCHEDULER_RUN_MINUTE:-0}
      SCHEDULER_TIME_ZONE: ${SCHEDULER_TIME_ZONE:-Europe/Warsaw}
      SCHEDULER_TIMEOUT_MS: ${SCHEDULER_TIMEOUT_MS:-900000}
    depends_on:
      generator:
        condition: service_started
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  migrate:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrations/run.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [app]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pseudointelekt
      POSTGRES_USER: pseudointelekt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pseudointelekt -d pseudointelekt"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks: [app]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.18.0
    environment:
      DATA_SOURCE_NAME: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt?sslmode=disable
    ports:
      - "10.2.11.53:9188:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  cloudflared:
    profiles: [edge]
    image: cloudflare/cloudflared:2026.6.0
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec cloudflared tunnel --no-autoupdate run --token \"$$(cat /run/secrets/tunnel-token)\""]
    volumes:
      - ${PSEUDOINTELEKT_TUNNEL_TOKEN_FILE:?PSEUDOINTELEKT_TUNNEL_TOKEN_FILE must be set}:/run/secrets/tunnel-token:ro
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks: [app]

volumes:
  postgres-data:

networks:
  app:
    driver: bridge
