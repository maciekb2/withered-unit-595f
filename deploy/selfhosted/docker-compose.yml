name: pseudointelekt

services:
  app:
    build:
      context: ../..
      dockerfile: deploy/selfhosted/Dockerfile
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      JETSON_GATEWAY_URL: ${JETSON_GATEWAY_URL:?JETSON_GATEWAY_URL must be set}
    expose:
      - "3000"
    ports:
      - "10.2.11.53:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - social-media:/data/social
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    networks: [app]

  # Internal-only generation runtime. No host port is published.
  generator:
    image: pseudointelekt-app
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      JETSON_GATEWAY_URL: ${JETSON_GATEWAY_URL:?JETSON_GATEWAY_URL must be set}
      SOCIAL_QUEUE_URL: http://app:3000/api/social/enqueue
    expose:
      - "3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  scheduler:
    image: pseudointelekt-app
    command: ["node", "./scripts/selfhosted-scheduler.mjs"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      SCHEDULER_APP_URL: http://generator:3001
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SCHEDULER_RUN_HOUR: ${SCHEDULER_RUN_HOUR:-10}
      SCHEDULER_RUN_MINUTE: ${SCHEDULER_RUN_MINUTE:-0}
      SCHEDULER_TIME_ZONE: ${SCHEDULER_TIME_ZONE:-Europe/Warsaw}
      SCHEDULER_TIMEOUT_MS: ${SCHEDULER_TIMEOUT_MS:-900000}
      SCHEDULER_RETRY_DELAY_MS: ${SCHEDULER_RETRY_DELAY_MS:-3600000}
      SCHEDULER_MAX_ATTEMPTS: ${SCHEDULER_MAX_ATTEMPTS:-2}
      SCHEDULER_STATE_FILE: /state/scheduler.json
      SCHEDULER_METRICS_FILE: /metrics/pseudointelekt_generation.prom
    volumes:
      - scheduler-state:/state
      - ${NODE_EXPORTER_TEXTFILE_DIR:-/var/lib/node_exporter/textfile_collector}:/metrics
    depends_on:
      generator:
        condition: service_started
      scheduler-init:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  scheduler-init:
    image: busybox:1.37
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /state /metrics && chown -R 1000:1000 /state /metrics"]
    volumes:
      - scheduler-state:/state
    restart: "no"
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE]
    networks: [app]

  social-worker:
    image: pseudointelekt-app
    command: ["node", "./scripts/social-worker.mjs"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      SOCIAL_MEDIA_DIR: /data/social
      SOCIAL_MUSIC_DIR: /data/music
      PUBLIC_SITE_URL: https://pseudointelekt.pl
      SOCIAL_WORKER_ENABLED: ${SOCIAL_WORKER_ENABLED:-true}
      SOCIAL_BUFFER_DRY_RUN: ${SOCIAL_BUFFER_DRY_RUN:-true}
      SOCIAL_WORKER_INTERVAL_MS: ${SOCIAL_WORKER_INTERVAL_MS:-900000}
      SOCIAL_LLM_MODEL: ${SOCIAL_LLM_MODEL:-qwen3:30b}
      JETSON_GATEWAY_URL: ${JETSON_GATEWAY_URL:?JETSON_GATEWAY_URL must be set}
    volumes:
      - social-media:/data/social
      - ${SOCIAL_MUSIC_DIR_HOST:-/opt/pseudointelekt/music}:/data/music:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      social-media-init:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  social-metrics:
    image: pseudointelekt-app
    command: ["node", "./scripts/social-metrics-sync.mjs"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
      SOCIAL_METRICS_ENABLED: ${SOCIAL_METRICS_ENABLED:-true}
      SOCIAL_METRICS_INTERVAL_MS: ${SOCIAL_METRICS_INTERVAL_MS:-21600000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  social-media-init:
    image: pseudointelekt-app
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /data/social && chown -R 1000:1000 /data/social"]
    volumes:
      - social-media:/data/social
    restart: "no"
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE]
    networks: [app]

  migrate:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrations/run.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [app]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pseudointelekt
      POSTGRES_USER: pseudointelekt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pseudointelekt -d pseudointelekt"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks: [app]

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.18.0
    environment:
      DATA_SOURCE_NAME: postgresql://pseudointelekt:${POSTGRES_PASSWORD}@postgres:5432/pseudointelekt?sslmode=disable
    ports:
      - "10.2.11.53:9188:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [app]

  cloudflared:
    profiles: [edge]
    image: cloudflare/cloudflared:2026.6.0
    command: ["tunnel", "--no-autoupdate", "run", "--token", "${PSEUDOINTELEKT_TUNNEL_TOKEN:?PSEUDOINTELEKT_TUNNEL_TOKEN must be set}"]
    volumes:
      - ${PSEUDOINTELEKT_TUNNEL_TOKEN_FILE:?PSEUDOINTELEKT_TUNNEL_TOKEN_FILE must be set}:/run/secrets/tunnel-token:ro
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    networks: [app]

volumes:
  postgres-data:
  social-media:
  scheduler-state:

networks:
  app:
    driver: bridge
