name: Deploy self-hosted mbprod

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pseudointelekt-mbprod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:ci
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.MBPROD_HOST }}
          username: ${{ secrets.MBPROD_USER }}
          key: ${{ secrets.MBPROD_SSH_KEY }}
          script: |
            export GITHUB_TOKEN='${{ secrets.MBPROD_GITHUB_TOKEN }}'
            export GITHUB_REPO='maciekb2/withered-unit-595f'
            export GITHUB_REF='main'
            /opt/apps/production/pseudointelekt/deploy/selfhosted/deploy.sh
